name: CI

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m unittest discover -s tests
      - name: Lint
        run: ruff check .
      - name: Build
        run: python -m build
      - name: CLI smoke
        run: |
          tracebench --version
          tracebench doctor --trace-file examples/traces/baseline.jsonl --format json
          tracebench schema --format markdown
          tracebench validate examples/traces/baseline.jsonl
          tracebench summarize examples/traces/baseline.jsonl --format markdown
          tracebench compare examples/traces/baseline.jsonl examples/traces/baseline.jsonl
